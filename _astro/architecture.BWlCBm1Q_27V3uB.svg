<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 930 390" font-family="-apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444444"/>
    </marker>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="930" height="390" fill="#FFFFFF"/>

  <!-- self-hosted container -->
  <rect x="340" y="65" width="250" height="205" rx="14" fill="#F6F7F9" stroke="#B6BCC4" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="465" y="95" text-anchor="middle" font-size="12.5" fill="#5A6270" font-weight="600">내 서버 (Docker · 셀프호스팅)</text>

  <!-- GitHub box -->
  <rect x="30" y="140" width="170" height="110" rx="12" fill="#24292F"/>
  <text x="115" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#FFFFFF">GitHub</text>
  <text x="115" y="212" text-anchor="middle" font-size="11" fill="#C9D1D9">GitHub App 설치 한 번</text>
  <text x="115" y="228" text-anchor="middle" font-size="11" fill="#C9D1D9">(All repositories)</text>

  <!-- ghcord box -->
  <rect x="365" y="140" width="200" height="110" rx="12" fill="#FFFFFF" stroke="#3A40C9" stroke-width="2.5"/>
  <text x="465" y="192" text-anchor="middle" font-size="21" font-weight="700" fill="#3A40C9">ghcord</text>
  <text x="465" y="216" text-anchor="middle" font-size="11" fill="#6B7280">FastAPI · SQLite</text>

  <!-- Discord box -->
  <rect x="730" y="140" width="170" height="110" rx="12" fill="#5865F2"/>
  <text x="815" y="188" text-anchor="middle" font-size="21" font-weight="700" fill="#FFFFFF">Discord</text>
  <text x="815" y="212" text-anchor="middle" font-size="11" fill="#E3E6FD">채널 알림 · DM</text>
  <text x="815" y="228" text-anchor="middle" font-size="11" fill="#E3E6FD">슬래시 커맨드</text>

  <!-- GitHub -> ghcord -->
  <line x1="205" y1="195" x2="357" y2="195" stroke="#444444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="282" y="182" text-anchor="middle" font-size="12.5" font-weight="600" fill="#333333">webhook 이벤트</text>
  <text x="282" y="214" text-anchor="middle" font-size="10.5" fill="#8A8F98">HMAC 서명 검증</text>

  <!-- ghcord -> Discord (notifications) -->
  <line x1="570" y1="167" x2="722" y2="167" stroke="#444444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="647" y="154" text-anchor="middle" font-size="12.5" font-weight="600" fill="#333333">알림 embed 발송</text>
  <text x="647" y="184" text-anchor="middle" font-size="10.5" fill="#8A8F98">REST / webhook</text>

  <!-- Discord -> ghcord (interactions) -->
  <line x1="725" y1="227" x2="573" y2="227" stroke="#444444" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="647" y="214" text-anchor="middle" font-size="12.5" font-weight="600" fill="#333333">슬래시 커맨드 (HTTP POST)</text>
  <text x="647" y="244" text-anchor="middle" font-size="10.5" fill="#8A8F98">Ed25519 서명 검증</text>

  <!-- no-gateway note -->
  <line x1="465" y1="270" x2="465" y2="322" stroke="#C4C9D0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="815" y1="250" x2="815" y2="322" stroke="#C4C9D0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="465" y1="322" x2="627" y2="322" stroke="#C4C9D0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <line x1="667" y1="322" x2="815" y2="322" stroke="#C4C9D0" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="647" y="328" text-anchor="middle" font-size="17" font-weight="700" fill="#FF5A45">✕</text>
  <text x="647" y="356" text-anchor="middle" font-size="11.5" font-weight="600" fill="#D14A38">상시 WebSocket(게이트웨이) 연결 없음</text>
  <text x="647" y="373" text-anchor="middle" font-size="10.5" fill="#8A8F98">메시지를 읽을 통로가 원천적으로 없음</text>
</svg>
